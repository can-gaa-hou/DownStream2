name: PyTorch Downstream CI 0

on:
  repository_dispatch:
    types:
      - pytorch-pr-trigger
      - pytorch-pr-close
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.commit_sha || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    if: ${{ github.event_name != 'repository_dispatch' || github.event.action == 'pytorch-pr-trigger' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report in-progress result to server
        if: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'pytorch-pr-trigger' }}
        shell: bash
        run: |
          OIDC_RESPONSE="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL")"

          OIDC_TOKEN="$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "$OIDC_RESPONSE")"

          curl --retry 3 --retry-delay 5 --retry-max-time 30 \
            -X POST "${{ vars.CI_RESULT_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "{
              \"workflow_name\": \"PyTorch Downstream CI 0\",
              \"upstream_repo\": \"${{ github.event.client_payload.upstream_repo }}\",
              \"commit_sha\": \"${{ github.event.client_payload.commit_sha }}\",
              \"status\": \"in_progress\",
              \"conclusion\": \"\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Run CI
        run: |
          echo "Running downstream workflow 0..."
          sleep 10
          echo "Done"

      - name: Report final result to server
        if: ${{ always() && github.event_name == 'repository_dispatch' && github.event.action == 'pytorch-pr-trigger' }}
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            RESULT=success
          else
            RESULT=failure
          fi

          OIDC_RESPONSE="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL")"

          OIDC_TOKEN="$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "$OIDC_RESPONSE")"

          curl --retry 3 --retry-delay 5 --retry-max-time 30 \
            -X POST "${{ vars.CI_RESULT_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "{
              \"workflow_name\": \"PyTorch Downstream CI 0\",
              \"upstream_repo\": \"${{ github.event.client_payload.upstream_repo }}\",
              \"commit_sha\": \"${{ github.event.client_payload.commit_sha }}\",
              \"status\": \"completed\",
              \"conclusion\": \"$RESULT\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

  close:
    if: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'pytorch-pr-close' }}
    runs-on: ubuntu-latest

    steps:
      - name: Close event marker
        run: |
          echo "Received close event for ${{ github.event.client_payload.commit_sha }}"
          echo "This run joins the same concurrency group and cancels any in-progress trigger run."
